version: '3.8'

services:
  robot-customer-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robot-customer-service
    environment:
      # 方式1：用.env文件读取（推荐，不用手动设置环境变量）
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      # 方式2：也可以直接写死（不推荐，只是演示）
      # - DASHSCOPE_API_KEY=你的真实密钥
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    ports:
      - "8501:8501"
    volumes:
      - ./rag/chroma_ab:/app/rag/chroma_ab
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      # 修正：Streamlit的健康检查路径是 /_stcore/health，且需要安装curl
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s